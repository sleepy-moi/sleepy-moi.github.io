<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>想对我说的话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
        }

        /* 头部标题 */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 15px;
            line-height: 1.5;
        }

        /* 表单卡片 */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        .form-item {
            margin-bottom: 20px;
        }

        .form-item label {
            display: block;
            color: #34495e;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 13px 18px;
            border: 1px solid #e0e6ed;
            border-radius: 18px;
            font-size: 15px;
            color: #2c3e50;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #409eff;
            box-shadow: 0 0 0 3px rgba(64, 158, 255, 0.1);
        }

        .form-textarea {
            width: 100%;
            min-height: 120px;
            padding: 13px 18px;
            border: 1px solid #e0e6ed;
            border-radius: 18px;
            font-size: 15px;
            color: #2c3e50;
            outline: none;
            resize: vertical;
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        .form-textarea:focus {
            border-color: #409eff;
            box-shadow: 0 0 0 3px rgba(64, 158, 255, 0.1);
        }

        /* 匿名选项 */
        .anonymous-box {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-left: 4px;
        }

        .anonymous-box input {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            accent-color: #409eff;
        }

        .anonymous-box label {
            color: #7f8c8d;
            font-size: 14px;
            user-select: none;
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 14px 0;
            background: linear-gradient(135deg, #409eff 0%, #66b1ff 100%);
            color: #ffffff;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(64, 158, 255, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(64, 158, 255, 0.35);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 提示信息 */
        .tip-box {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            height: 20px;
        }

        .info-tip {
            color: #409eff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部标题 -->
        <div class="header">
            <h1>💬 想对我说的话</h1>
            <p>可以匿名告诉我你的想法、建议和小秘密</p>
        </div>

        <!-- 留言表单 -->
        <div class="card">
            <div class="form-item">
                <label for="name">你的昵称</label>
                <input type="text" id="name" class="form-input" placeholder="可选，匿名可不填">
            </div>
            <div class="form-item">
                <label for="content">留言内容 *</label>
                <textarea id="content" class="form-textarea" placeholder="在这里写下你想对我说的话吧~ 支持文字和表情😊" required></textarea>
            </div>
            <div class="anonymous-box">
                <input type="checkbox" id="anonymous">
                <label for="anonymous">匿名提交</label>
            </div>
            <button class="submit-btn" id="submitBtn">提交留言</button>
            <div class="tip-box info-tip" id="tipBox"></div>
        </div>
    </div>

    <script>
        // 你的仓库信息，已确认无误，无需修改
        const GITHUB_USERNAME = "sleepy-moi";
        const GITHUB_REPO = "sleepy-moi.github.io";

        // DOM元素
        const nameInput = document.getElementById('name');
        const contentInput = document.getElementById('content');
        const anonymousCheck = document.getElementById('anonymous');
        const submitBtn = document.getElementById('submitBtn');
        const tipBox = document.getElementById('tipBox');

        // 提示信息
        function showTip(text) {
            tipBox.textContent = text;
            setTimeout(() => {
                tipBox.textContent = "";
            }, 3000);
        }

        // 核心提交逻辑：GitHub原生跳转，100%成功
        submitBtn.addEventListener('click', () => {
            const content = contentInput.value.trim();
            if (!content) {
                showTip("请输入留言内容哦");
                return;
            }

            // 处理昵称，匿名自动替换
            let name = nameInput.value.trim();
            const isAnonymous = anonymousCheck.checked;
            if (isAnonymous || !name) {
                name = "匿名用户";
            }
            // 生成提交时间
            const submitTime = new Date().toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });

            // 生成GitHub原生提交链接，自动填充内容，提交后自动返回
            const issueTitle = encodeURIComponent(`${name} | ${submitTime}`);
            const issueBody = encodeURIComponent(content);
            const returnUrl = encodeURIComponent(window.location.href);
            const submitUrl = `https://github.com/${GITHUB_USERNAME}/${GITHUB_REPO}/issues/new?title=${issueTitle}&body=${issueBody}&labels=留言&returnUrl=${returnUrl}`;

            // 提示用户
            showTip("正在跳转到提交页面，提交后会自动返回~");
            // 延迟跳转，让用户看到提示
            setTimeout(() => {
                window.location.href = submitUrl;
            }, 1000);
        });

        // Ctrl+回车快捷提交
        contentInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                submitBtn.click();
            }
        });
    </script>
</body>
</html>
